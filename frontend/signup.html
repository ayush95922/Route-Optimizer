<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | SmartRoute</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css"/>
  <script>
    // Prevent FOUC for dark mode
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            brand: { green: '#22c55e', dark: '#0f2027' },
          }
        }
      }
    }
  </script>
</head>
<body class="font-sans h-screen overflow-hidden text-brand-dark dark:text-white transition-colors duration-300">

  <!-- NAV -->
  <nav class="backdrop-blur-xl bg-[#0f2027]/90 px-8 py-4 flex items-center justify-between fixed top-0 left-0 right-0 z-50 border-b border-white/10 shadow-2xl transition-all duration-300">
    <a href="index.html" class="flex items-center gap-2 group">
      <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-xl flex items-center justify-center shadow-lg shadow-green-500/30 transition-transform duration-300 group-hover:scale-105 group-hover:rotate-3">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div>
        <span class="text-white font-bold text-lg"><span class="text-white">Smart</span><span class="text-green-400">Route</span></span>
        <div class="text-[10px] text-green-400 tracking-widest font-medium -mt-1">INDORE TRANSIT</div>
      </div>
    </a>
    <div class="flex items-center gap-8">
      <a href="index.html" class="text-gray-400 hover:text-white font-medium text-sm transition">Home</a>
      <a href="routes.html" class="text-gray-400 hover:text-white font-medium text-sm transition">Find Routes</a>
      <a href="champions.html" class="text-gray-400 hover:text-white font-medium text-sm transition">Champions</a>
    </div>
    <div class="flex items-center gap-4">
      <button id="themeToggle" class="text-gray-400 hover:text-white transition focus:outline-none p-1.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/5">
        <svg id="themeToggleLightIcon" class="hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <svg id="themeToggleDarkIcon" class="hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
      <a href="login.html" class="text-white text-sm font-medium hover:text-green-400 transition">Sign in</a>
      <a href="signup.html" class="bg-green-500 hover:bg-green-600 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">Get Started</a>
    </div>
  </nav>

  <!-- Split Layout -->
  <div class="flex h-screen pt-[52px]">

    <!-- Left: street image -->
    <div class="w-[50%] relative overflow-hidden">
      <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80"
           alt="City street" class="w-full h-full object-cover"/>
      <div class="absolute inset-0 bg-gradient-to-b from-black/30 to-black/65"></div>
      <div class="absolute bottom-12 left-10 text-white">
        <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur border border-white/20 rounded-full px-4 py-1.5 text-xs font-semibold text-white mb-5">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>
          JOIN THE MOVEMENT
        </div>
        <h2 class="text-4xl font-black leading-tight mb-2">Become a<br/><span class="text-green-400">Campus Champion.</span></h2>
        <p class="text-gray-200 text-sm leading-relaxed mt-3 max-w-xs">Every walk, ride and bus trip lowers the city's carbon load.<br/>We track yours and put you on the leaderboard.</p>
      </div>
    </div>

    <!-- Right: form -->
    <div class="w-[50%] flex items-center justify-center bg-gray-50 dark:bg-brand-dark px-16 transition-colors duration-300">
      <div class="w-full max-w-md">
        <div class="text-green-600 dark:text-green-400 text-xs font-bold tracking-widest mb-2 transition-colors">GET STARTED</div>
        <h2 class="text-3xl font-black text-[#0f2027] dark:text-white mb-1 transition-colors">Create your account</h2>
        <p class="text-gray-500 dark:text-gray-400 text-sm mb-8 transition-colors">Already onboard? <a href="login.html" class="text-green-600 dark:text-green-400 font-semibold hover:underline">Sign in →</a></p>

        <form id="signupForm" onsubmit="handleSignup(event)" class="space-y-5">
          <div>
            <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 tracking-widest mb-2 transition-colors">USERNAME</label>
            <input type="text" id="username" placeholder="Your display name" required
              class="w-full border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-white dark:bg-brand-dark/50 dark:text-white shadow-sm transition-colors"/>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 tracking-widest mb-2 transition-colors">EMAIL</label>
            <input type="email" id="email" placeholder="you@email.com" required
              class="w-full border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-white dark:bg-brand-dark/50 dark:text-white shadow-sm transition-colors"/>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 tracking-widest mb-2 transition-colors">PASSWORD</label>
            <input type="password" id="password" placeholder="At least 6 characters" minlength="6" required
              class="w-full border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-white dark:bg-brand-dark/50 dark:text-white shadow-sm transition-colors"/>
          </div>

          <div id="signupError" class="hidden text-red-500 text-sm text-center py-2 bg-red-50 dark:bg-red-500/10 rounded-lg transition-colors"></div>
          <div id="signupSuccess" class="hidden text-green-600 dark:text-green-400 text-sm text-center py-2 bg-green-50 dark:bg-green-500/10 rounded-lg transition-colors"></div>

          <button type="submit"
            class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3.5 rounded-xl text-sm transition flex items-center justify-center gap-2 shadow-lg shadow-green-200 dark:shadow-green-900/30">
            Create account →
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    async function handleSignup(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('signupError');
      const okEl  = document.getElementById('signupSuccess');
      errEl.classList.add('hidden'); okEl.classList.add('hidden');
      try {
        const res = await fetch('http://localhost:8080/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('user', JSON.stringify(data));
          window.location.href = 'routes.html';
        } else {
          errEl.textContent = data.message || 'Registration failed';
          errEl.classList.remove('hidden');
        }
      } catch {
        // Demo mode fallback
        localStorage.setItem('user', JSON.stringify({ name: username, email, ecoPoints: 0 }));
        okEl.textContent = '🎉 Account created! Redirecting...';
        okEl.classList.remove('hidden');
        setTimeout(() => window.location.href = 'routes.html', 1200);
      }
    }
  </script>
</body>
</html>
