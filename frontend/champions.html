<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Champions | SmartRoute</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css"/>
  <script>
    // Prevent FOUC for dark mode
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            brand: { green: '#22c55e', dark: '#0f2027' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#f8faf9] dark:bg-brand-dark font-sans text-brand-dark dark:text-white transition-colors duration-300">

  <!-- NAV -->
  <nav class="backdrop-blur-xl bg-[#0f2027]/90 px-8 py-4 flex items-center justify-between sticky top-0 z-50 border-b border-white/10 shadow-2xl transition-all duration-300">
    <a href="index.html" class="flex items-center gap-2 group">
      <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-xl flex items-center justify-center shadow-lg shadow-green-500/30 transition-transform duration-300 group-hover:scale-105 group-hover:rotate-3">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div>
        <span class="text-white font-bold text-lg"><span class="text-white">Smart</span><span class="text-green-400">Route</span></span>
        <div class="text-[10px] text-green-400 tracking-widest font-medium -mt-1">INDORE TRANSIT</div>
      </div>
    </a>
    <div class="flex items-center gap-8">
      <a href="index.html" class="text-gray-400 hover:text-white font-medium text-sm transition">Home</a>
      <a href="routes.html" class="text-gray-400 hover:text-white font-medium text-sm transition">Find Routes</a>
      <a href="champions.html" class="text-white font-medium text-sm border-b-2 border-green-400 pb-0.5">Champions</a>
    </div>
    <div class="flex items-center gap-4">
      <button id="themeToggle" class="text-gray-400 hover:text-white transition focus:outline-none p-1.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/5">
        <svg id="themeToggleLightIcon" class="hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <svg id="themeToggleDarkIcon" class="hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
      <span id="navUser" class="text-green-400 text-sm font-medium hidden"></span>
      <a href="login.html" id="navSignIn" class="text-white text-sm font-medium hover:text-green-400 transition">Sign in</a>
      <a href="signup.html" class="bg-green-500 hover:bg-green-600 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">Get Started</a>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="px-16 pt-12 pb-6 max-w-5xl mx-auto">
    <div class="inline-flex items-center gap-2 border border-gray-300 dark:border-white/20 rounded-full px-4 py-1.5 text-xs font-bold text-gray-600 dark:text-gray-300 mb-6 transition-colors">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21l4-4 4 4M12 17V3"/><path d="M3 9l9-7 9 7"/></svg>
      CAMPUS CHAMPIONS
    </div>
    <h1 class="text-4xl font-black text-[#0f2027] dark:text-white mb-2 transition-colors">
      The leaderboard of <span class="text-green-500">cleaner air</span>
    </h1>
    <p class="text-gray-500 dark:text-gray-400 text-base leading-relaxed max-w-lg transition-colors">
      Ranked by total CO₂ saved across walks, rides and bus trips. Climb up the ranks one trip at a time.
    </p>
  </div>

  <!-- TOP 3 PODIUM -->
  <div class="px-16 pb-8 max-w-5xl mx-auto">
    <div class="grid grid-cols-3 gap-5" id="top3Cards">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- FULL LEADERBOARD TABLE -->
  <div class="px-16 pb-16 max-w-5xl mx-auto">
    <div class="bg-white dark:bg-white/5 rounded-2xl shadow-sm overflow-hidden border border-transparent dark:border-white/10 transition-colors">
      <table class="w-full">
        <thead>
          <tr class="border-b border-gray-100 dark:border-white/10 transition-colors">
            <th class="text-left px-6 py-4 text-xs font-bold text-gray-400 tracking-widest">RANK</th>
            <th class="text-left px-6 py-4 text-xs font-bold text-gray-400 tracking-widest">CHAMPION</th>
            <th class="text-left px-6 py-4 text-xs font-bold text-gray-400 tracking-widest">ECO TRIPS</th>
            <th class="text-right px-6 py-4 text-xs font-bold text-gray-400 tracking-widest">CARBON SAVED</th>
          </tr>
        </thead>
        <tbody id="leaderTable">
          <!-- Filled by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="champions.js"></script>
</body>
</html>
