spring.application.name=smartroute-backend
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/smartroute
spring.data.mongodb.database=smartroute

# JWT
app.jwt.secret=SmartRouteIndoreTransit2026SuperSecretKeyForJWTSigning
